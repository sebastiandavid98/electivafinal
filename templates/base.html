<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block titulo %}Mi Proyecto Django{% endblock %}</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f5f5f5;
            color: #333;
        }

        header {
            background-color: #0c4b33;
            color: white;
            padding: 1rem 2rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        header h1 {
            font-size: 1.5rem;
        }

        nav a {
            color: white;
            text-decoration: none;
            margin-left: 1.5rem;
            font-size: 0.95rem;
        }

        nav a:hover {
            text-decoration: underline;
        }

        main {
            max-width: 960px;
            margin: 2rem auto;
            padding: 0 1rem;
        }

        footer {
            text-align: center;
            padding: 1.5rem;
            background-color: #0c4b33;
            color: #ccc;
            font-size: 0.85rem;
            margin-top: 3rem;
        }

        {% block estilos_extra %}{% endblock %}
    </style>
</head>
<body>
    <header>
        <h1>🐍 Mi Proyecto Django</h1>
        <nav>
            <a href="{% url 'core:inicio' %}">Inicio</a>
            <a href="/admin/">Admin</a>
        </nav>
    </header>

    <main>
        {% if messages %}
            {% for message in messages %}
                <div class="mensaje {{ message.tags }}">{{ message }}</div>
            {% endfor %}
        {% endif %}

        {% block contenido %}{% endblock %}
    </main>

    <footer>
        <p>Mi Proyecto Django &copy; 2026 — Construido con Django {{ django_version }}</p>
    </footer>
</body>
</html>
