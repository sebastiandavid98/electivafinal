<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>{{ titulo }}</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; margin: 0; }
        header { background: #0c4b33; color: white; padding: 1rem 2rem; }
        header a { color: #a8d5b5; text-decoration: none; }
        main { max-width: 560px; margin: 2rem auto; padding: 0 1rem; }
        h2 { color: #0c4b33; margin-bottom: 1.5rem; }
        .card { background: white; padding: 2rem; border-radius: 10px;
                box-shadow: 0 2px 8px rgba(0,0,0,.08); }
        label { display: block; margin-bottom: .25rem; font-size: .9rem; color: #555; }
        .form-control { width: 100%; padding: .6rem .8rem; border: 1px solid #ccc;
                        border-radius: 6px; margin-bottom: .25rem; font-size: 1rem; box-sizing: border-box; }
        .errorlist { color: #c0392b; font-size: .82rem; margin: 0 0 .75rem; padding-left: 1rem; }
        .form-group { margin-bottom: 1rem; }
        .acciones { display: flex; gap: 1rem; margin-top: 1.5rem; }
        .btn { padding: .6rem 1.4rem; border-radius: 6px; border: none;
               font-size: .95rem; cursor: pointer; text-decoration: none; }
        .btn-primary { background: #0c4b33; color: white; }
        .btn-secondary { background: #95a5a6; color: white; }
    </style>
</head>
<body>
<header>
    <a href="{% url 'calificaciones_heidy:lista' %}">← Volver al listado</a>
</header>
<main>
    <h2>{{ titulo }}</h2>
    <div class="card">
        <form method="post">
            {% csrf_token %}
            {% for field in form %}
            <div class="form-group">
                <label for="{{ field.id_for_label }}">{{ field.label }}</label>
                {{ field }}
                {% if field.errors %}
                    <ul class="errorlist">
                        {% for error in field.errors %}<li>{{ error }}</li>{% endfor %}
                    </ul>
                {% endif %}
            </div>
            {% endfor %}
            <div class="acciones">
                <button type="submit" class="btn btn-primary">Guardar</button>
                <a href="{% url 'calificaciones_heidy:lista' %}" class="btn btn-secondary">Cancelar</a>
            </div>
        </form>
    </div>
</main>
</body>
</html>
